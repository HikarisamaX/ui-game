<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="一个可直接在 GitHub Pages 运行的复古纵版打飞机小游戏。"
    />
    <title>复古空战十关</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="游戏状态">
        <div>
          <span>关卡</span>
          <strong id="levelText" class="num">1 / 10</strong>
        </div>
        <div>
          <span>得分</span>
          <strong id="scoreText" class="num">0</strong>
        </div>
        <div>
          <span>生命</span>
          <strong id="livesText" class="num">3</strong>
        </div>
        <div>
          <span>敌机</span>
          <strong id="targetText" class="num">0 / 0</strong>
        </div>
      </section>

      <section class="stage-wrap" aria-label="复古打飞机游戏区域">
        <canvas id="game" width="720" height="560" aria-label="复古纵版打飞机游戏画面"></canvas>
        <div id="overlay" class="overlay">
          <div class="panel">
            <h1 id="overlayTitle">复古空战十关</h1>
            <p id="overlayText">
              鼠标左右移动控制战机，战机会自动射击。躲开敌方子弹，消灭所有敌机。
            </p>
            <button id="startButton" type="button">开始游戏</button>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="游戏控制">
        <button id="pauseButton" type="button" aria-label="暂停或继续游戏">暂停</button>
        <button id="restartButton" type="button" aria-label="重新开始游戏">重开</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
