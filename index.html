<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="一个可直接在 GitHub Pages 运行的鼠标操作小蜜蜂闯关游戏。"
    />
    <title>小蜜蜂十关冒险</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="游戏状态">
        <div>
          <span>关卡</span>
          <strong id="levelText" class="num">1 / 10</strong>
        </div>
        <div>
          <span>花蜜</span>
          <strong id="scoreText" class="num">0</strong>
        </div>
        <div>
          <span>生命</span>
          <strong id="livesText" class="num">3</strong>
        </div>
        <div>
          <span>本关</span>
          <strong id="targetText" class="num">6</strong>
        </div>
      </section>

      <section class="stage-wrap" aria-label="小蜜蜂游戏区域">
        <canvas id="game" width="720" height="520" aria-label="小蜜蜂闯关游戏画面"></canvas>
        <div id="overlay" class="overlay">
          <div class="panel">
            <h1 id="overlayTitle">小蜜蜂十关冒险</h1>
            <p id="overlayText">
              横向移动鼠标控制小蜜蜂，接住花蜜，避开雨滴、蜘蛛网和黄蜂。
            </p>
            <button id="startButton" type="button">开始游戏</button>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="游戏控制">
        <button id="pauseButton" type="button" aria-label="暂停或继续游戏">暂停</button>
        <button id="restartButton" type="button" aria-label="重新开始游戏">重开</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
